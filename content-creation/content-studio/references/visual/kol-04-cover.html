<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KOL 04 · 决策者都应该有高段位 AI KOL 情报库</title>
  <link rel="stylesheet" href="kol-card-style.css" />
</head>
<body class="preview-page">
  <main class="kol-card" aria-label="KOL 04 卡片">
    <div class="frame-line top" aria-hidden="true"></div>
    <div class="frame-line bottom" aria-hidden="true"></div>

    <!-- 顶部：左 ID 标签 -->
    <header class="identity" aria-label="账号身份位">
      <div class="logo-slot">RYDER</div>
      <div class="identity-name">高段位 AI KOL 情报库</div>
    </header>

    <!-- 顶部：右 KOL 编号角标 -->
    <div class="kol-badge" aria-label="KOL 编号角标">
      <div class="kol-number">04</div>
      <div class="kol-label">KOL INTEL</div>
    </div>

    <!-- 红线分隔 -->
    <div class="red-divider" aria-hidden="true"></div>

    <!-- 头部：左 头像 -->
    <div class="head-avatar" aria-label="Ryder 头像">
      <img src="file:///Users/rydersun/.hermes/skills/creative/content-studio/assets/avatar.png" alt="Ryder" class="avatar-img" />
    </div>

    <!-- 头部：右 装饰方块 -->
    <div class="head-deco" aria-hidden="true">
      <div class="deco-tag">NEW</div>
      <div class="deco-line"></div>
      <div class="deco-num">No.04</div>
    </div>

    <!-- 主标题 3 行（全部居中）-->
    <h1 class="title-line title-line-1">决策者都应该有</h1>
    <h1 class="title-line title-line-2">高段位 AI</h1>
    <h1 class="title-line title-line-3">KOL 情报库</h1>

    <!-- 副标题盒（居中）-->
    <p class="subtitle-box">2 小时访谈 → 5 分钟笔记 · 一周一期</p>

    <!-- 底部：左 01 stamp -->
    <aside class="stamp-card" aria-label="页码 stamp">
      <div class="stamp-num">04</div>
      <div class="stamp-meta">
        <div>COVER</div>
        <div>KOL</div>
        <div>CARD</div>
      </div>
    </aside>

    <!-- 底部：中 条形码 -->
    <div class="barcode-block" aria-hidden="true">
      <div class="barcode"></div>
      <div class="barcode-label">BARCODE / 04</div>
    </div>

    <!-- 底部：右 RYDER 卡 -->
    <aside class="ryder-card" aria-label="RYDER 签名卡">
      <div class="ryder-chip">AI PM / WEEKLY</div>
      <h3 class="ryder-title">不写「怎么用」</h3>
      <p class="ryder-copy">写「为什么是他」 · 决策者视角的访谈拆解</p>
    </aside>

    <!-- 页脚 -->
    <footer class="footer-note">RYDER · KOL INTEL WEEKLY / ISSUE 04 / 2026-06</footer>
  </main>
</body>
</html>
