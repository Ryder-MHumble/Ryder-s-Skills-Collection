<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Ending — 极简结尾卡</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card" aria-label="简易模式结尾卡">
    <!-- 收尾文案 -->
    <div class="ending-text">
      <div class="main" contenteditable="true">收尾主文案</div>
      <div class="sub" contenteditable="true">副文案 / 引导关注的话</div>
    </div>

    <!-- 头像 -->
    <div class="ending-avatar">
      <div class="ring ring-1" aria-hidden="true"></div>
      <div class="img-clip">
        <img src="avatar.png" alt="Ryder" />
      </div>
    </div>

    <!-- CTA 按钮 -->
    <div class="ending-cta">
      <div class="label" contenteditable="true">点赞 · 收藏 · 关注</div>
    </div>

    <!-- ID 标签 -->
    <div class="ending-id" contenteditable="true">叫我 Ryder 就好</div>
  </main>
</body>
</html>
