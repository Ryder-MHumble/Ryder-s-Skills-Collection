<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Cover — 极简封面</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card" aria-label="简易模式封面">
    <!-- ID 标签（固定，不换） -->
    <div class="cover-id" contenteditable="true">叫我 Ryder 就好</div>

    <!-- 3 行钩子句：替换为你的主标题 -->
    <div class="cover-hook">
      <span class="line" contenteditable="true">主标题第一行</span>
      <span class="line" contenteditable="true">主标题第二行</span>
      <span class="line kol" contenteditable="true">关键词放这里</span>
    </div>

    <!-- 红色分隔线 -->
    <div class="cover-divider" aria-hidden="true"></div>

    <!-- 副标题：一句话承诺 / 痛点 -->
    <div class="cover-sub">
      <div class="box" contenteditable="true">副标题 / 一句话承诺</div>
    </div>

    <!-- 头像 -->
    <div class="cover-avatar">
      <div class="ring ring-1" aria-hidden="true"></div>
      <div class="ring ring-2" aria-hidden="true"></div>
      <div class="img-clip">
        <img src="avatar.png" alt="Ryder" />
      </div>
    </div>
  </main>
</body>
</html>
