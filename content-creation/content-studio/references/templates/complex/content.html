<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Complex Content — Brutalist 内容卡</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card" aria-label="复杂模式内容卡">
    <!-- 顶部页眉：黑底 + ID 标签 + 页码 -->
    <header class="content-header">
      <div class="id-tag">
        <div class="av"><img src="avatar.png" alt="Ryder" /></div>
        <div class="nm" contenteditable="true">叫我 Ryder 就好</div>
      </div>
      <div class="pg" contenteditable="true">02 / 05</div>
    </header>

    <!-- 内容区 -->
    <div class="content-body">
      <div class="content-section">
        <div class="heading" contenteditable="true">核心洞察</div>
        <div class="text" contenteditable="true">
          这里是内容区域。替换为你的正文内容。
        </div>
      </div>

      <div class="content-callout" contenteditable="true">
        关键结论用黑底白字 callout 突出显示。
      </div>

      <div class="content-section">
        <div class="heading" contenteditable="true">补充分析</div>
        <div class="text" contenteditable="true">
          支持多个 section 块，每个用红色左竖线标记。
        </div>
      </div>
    </div>

    <!-- 底部页脚 -->
    <footer class="content-footer">
      <div class="sig" contenteditable="true">RYDER'S KOL INTELLIGENCE</div>
      <div class="issue" contenteditable="true">ISSUE 04 · 2026</div>
    </footer>
  </main>
</body>
</html>
