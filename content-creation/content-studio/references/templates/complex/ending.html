<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Complex Ending — Brutalist 结尾卡</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card" aria-label="复杂模式结尾卡">
    <!-- 收尾文字（两行 box） -->
    <div class="ending-main">
      <div class="line-1" contenteditable="true">关注 Ryder</div>
      <div class="line-2" contenteditable="true">KOL 情报库</div>
      <div class="sub" contenteditable="true">高段位 AI 决策者的信息源</div>
    </div>

    <!-- 头像 -->
    <div class="ending-avatar">
      <div class="shadow" aria-hidden="true"></div>
      <div class="clip">
        <img src="avatar.png" alt="Ryder" />
      </div>
    </div>

    <!-- CTA -->
    <div class="ending-cta-block">
      <div class="cta" contenteditable="true">点赞 · 收藏 · 关注</div>
    </div>

    <!-- ID 底栏 -->
    <div class="ending-id-bar">
      <div class="name" contenteditable="true">叫我 Ryder 就好</div>
      <div class="tag" contenteditable="true">AI PM / KOL INTEL</div>
    </div>
  </main>
</body>
</html>
