<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Complex Cover — Brutalist 杂志风封面</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card" aria-label="复杂模式封面">
    <!-- 1) ID 卡片（左上贴边） -->
    <header class="cover-id">
      <div class="avatar-mini">
        <img src="avatar.png" alt="Ryder" />
      </div>
      <div class="name" contenteditable="true">叫我 Ryder 就好</div>
    </header>

    <!-- 2) KOL 编号角标（右上贴边） -->
    <div class="cover-badge" contenteditable="true">KOL INTEL / 04</div>

    <!-- 3) Meta-rail 横线 -->
    <div class="cover-meta">
      <div class="row">
        <span contenteditable="true">DECISION SIGNALS</span>
        <span contenteditable="true">NO.04 / COVER</span>
      </div>
    </div>

    <!-- 4) 主标题 3 行（居中，不同色底） -->
    <h1 class="title-1" contenteditable="true">高段位 AI</h1>
    <h1 class="title-2" contenteditable="true">决策者都应该有</h1>
    <h1 class="title-3" contenteditable="true">KOL 情报库</h1>

    <!-- 5) 副标题（居中） -->
    <p class="cover-sub" contenteditable="true">2 小时访谈 → 5 分钟笔记</p>

    <!-- 6) 底部 stamp（左下贴边） -->
    <aside class="cover-stamp">
      <div class="num" contenteditable="true">04</div>
      <div class="meta">
        <div contenteditable="true">COVER</div>
        <div contenteditable="true">5 MIN</div>
        <div contenteditable="true">XHS</div>
      </div>
    </aside>

    <!-- 7) RYDER 支持卡（右下贴边） -->
    <aside class="cover-ryder">
      <h3 class="ryder-title" contenteditable="true">RYDER</h3>
      <div class="ryder-chip" contenteditable="true">AI PM / INTEL NOTES</div>
      <p class="ryder-desc" contenteditable="true">KOL 情报库</p>
      <p class="ryder-tag" contenteditable="true">HIGH-STAKES DECISIONS</p>
    </aside>

    <!-- 8) Footer -->
    <footer class="cover-footer" contenteditable="true">BRUTAL CARD SYSTEM / CENTERED + ASYMMETRIC / 1200x1600</footer>
  </main>
</body>
</html>
