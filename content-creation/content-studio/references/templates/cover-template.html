<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小红书新野兽派封面模板 — v1 PIL 对齐版</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="preview-page">
  <main class="xhs-card cover-card" aria-label="小红书封面模板（v1 PIL 对齐）">

    <!-- 顶部红方块（左上角）— 装饰张力 -->
    <div class="card-red-corner" aria-hidden="true"></div>

    <!-- 顶部：左 ID 卡片（贴边）+ 右 KOL 角标（贴边）— 边缘不对称 -->
    <header class="identity" aria-label="唯一账号身份位">
      <div class="logo-slot" contenteditable="true">头像</div>
      <div class="identity-name" contenteditable="true">账号名 / 栏目名</div>
    </header>

    <div class="top-badge" contenteditable="true">COVER / 01</div>

    <!-- meta-rail 横贯（左右贴边文字） -->
    <section class="meta-rail" aria-label="封面元信息">
      <div class="meta-row">
        <span class="meta-left" contenteditable="true">DECISION SIGNALS</span>
        <span class="meta-right" contenteditable="true">NO.01 / COVER SYSTEM</span>
      </div>
    </section>

    <!-- 主标题 3 行（居中）+ 副标题（居中）— 视觉重心 -->
    <h1 class="title-block title-1" contenteditable="true">主标题第一行</h1>
    <h2 class="title-block title-2" contenteditable="true">主标题第二行</h2>
    <h2 class="title-block title-3" contenteditable="true">关键词放这里</h2>
    <p class="subtitle-bar" contenteditable="true">副标题 / 痛点 / 一句话承诺</p>

    <!-- 装饰：黑红条纹 + 4 个 + 标记（错位分布） -->
    <div class="stripe" aria-hidden="true"></div>
    <span class="plus-marker plus-1" aria-hidden="true">+</span>
    <span class="plus-marker plus-2 red" aria-hidden="true">+</span>
    <span class="plus-marker plus-3 red" aria-hidden="true">+</span>
    <span class="plus-marker plus-4 red" aria-hidden="true">+</span>

    <!-- 底部：左 stamp + 右 support 卡（贴边不对称） -->
    <aside class="page-stamp" aria-label="页码和封面元数据">
      <div class="page-number" contenteditable="true">01</div>
      <div class="stamp-meta">
        <div contenteditable="true">COVER</div>
        <div contenteditable="true">5 MIN</div>
        <div contenteditable="true">XHS</div>
      </div>
    </aside>

    <aside class="support-card" aria-label="辅助信息区，不放重复身份信息">
      <div class="barcode" aria-hidden="true"></div>
      <h3 class="support-title" contenteditable="true">RYDER</h3>
      <div class="support-chip" contenteditable="true">AI PM / INTEL NOTES</div>
      <p class="support-name" contenteditable="true">栏目名 / KOL 情报库</p>
      <p class="support-tag" contenteditable="true">HIGH-STAKES DECISIONS</p>
    </aside>

    <footer class="footer-note" contenteditable="true">REDESIGNED BRUTAL CARD SYSTEM / TEXT NEVER OVERLAPS / 1240x1654</footer>
  </main>
</body>
</html>
